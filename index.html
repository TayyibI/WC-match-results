<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The Knockout Pool</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;600;700;900&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --pitch: #0b3d2e;
    --pitch-deep: #072a20;
    --chalk: #f2f4ef;
    --line: #e9ece4;
    --grass: #1f9d55;
    --grass-bright: #34d17e;
    --clay: #d8572a;
    --gold: #f0b429;
    --ink: #0d1410;
    --mute: #6f7c73;
    --card: #ffffff;
    --rule: #dde2d8;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Archivo', system-ui, sans-serif;
    background: var(--chalk);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    line-height: 1.4;
  }

  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 20px; }

  /* ---- Header ---- */
  header {
    background:
      linear-gradient(180deg, var(--pitch) 0%, var(--pitch-deep) 100%);
    color: var(--chalk);
    padding: 40px 0 0;
    position: relative;
    overflow: hidden;
    border-bottom: 3px solid var(--gold);
  }
  header::after {
    content: "";
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(90deg, transparent 0 78px, rgba(255,255,255,0.035) 78px 156px);
    pointer-events: none;
  }
  .eyebrow {
    font-family: 'Spline Sans Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--grass-bright);
    margin-bottom: 10px;
  }
  h1 {
    font-size: clamp(38px, 8vw, 76px);
    font-weight: 900;
    line-height: 0.92;
    letter-spacing: -0.02em;
    text-transform: uppercase;
  }
  h1 .alt { color: var(--gold); }
  .sub {
    margin-top: 14px;
    max-width: 540px;
    color: rgba(242,244,239,0.78);
    font-size: 15px;
  }
  .tabs {
    display: flex;
    gap: 4px;
    margin-top: 30px;
    position: relative;
    z-index: 2;
  }
  .tab {
    background: none;
    border: none;
    color: rgba(242,244,239,0.6);
    font-family: 'Archivo', sans-serif;
    font-weight: 700;
    font-size: 14px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    padding: 14px 18px;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab:hover { color: var(--chalk); }
  .tab.active { color: var(--chalk); border-bottom-color: var(--gold); }

  /* ---- Body ---- */
  main { padding: 36px 0 80px; }

  .status {
    font-family: 'Spline Sans Mono', monospace;
    font-size: 13px;
    color: var(--mute);
    padding: 40px 0;
    text-align: center;
  }
  .status.err { color: var(--clay); }

  /* ---- Leaderboard ---- */
  .lb { border-top: 2px solid var(--ink); }
  .lb-row {
    display: grid;
    grid-template-columns: 56px 1fr auto auto;
    align-items: center;
    gap: 16px;
    padding: 18px 8px;
    border-bottom: 1px solid var(--rule);
  }
  .lb-row.head {
    border-bottom: 1px solid var(--ink);
    padding: 10px 8px;
  }
  .lb-row.head span {
    font-family: 'Spline Sans Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mute);
  }
  .rank {
    font-family: 'Spline Sans Mono', monospace;
    font-size: 22px;
    font-weight: 600;
    color: var(--mute);
  }
  .lb-row:nth-child(2) .rank { color: var(--gold); }
  .lb-row:nth-child(3) .rank { color: var(--grass); }
  .lb-row:nth-child(4) .rank { color: var(--clay); }
  .player-name { font-weight: 700; font-size: 18px; }
  .player-meta {
    font-family: 'Spline Sans Mono', monospace;
    font-size: 12px;
    color: var(--mute);
    margin-top: 2px;
  }
  .pts {
    font-family: 'Spline Sans Mono', monospace;
    font-weight: 600;
    font-size: 28px;
    text-align: right;
  }
  .pts-label {
    font-family: 'Spline Sans Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--mute);
    text-align: right;
  }

  /* ---- Matches ---- */
  .round-head {
    font-family: 'Spline Sans Mono', monospace;
    font-size: 12px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--grass);
    margin: 34px 0 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .round-head::after {
    content: "";
    flex: 1;
    height: 1px;
    background: var(--rule);
  }
  .match {
    background: var(--card);
    border: 1px solid var(--rule);
    border-radius: 10px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .match-top {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 14px;
    padding: 18px 20px;
    cursor: pointer;
    user-select: none;
  }
  .team {
    font-weight: 700;
    font-size: 17px;
  }
  .team.right { text-align: right; }
  .team.win { color: var(--grass); }
  .team.lose { color: var(--mute); }
  .score-box { text-align: center; }
  .score {
    font-family: 'Spline Sans Mono', monospace;
    font-weight: 600;
    font-size: 22px;
  }
  .score.pending { color: var(--mute); font-size: 15px; }
  .vs {
    font-family: 'Spline Sans Mono', monospace;
    font-size: 11px;
    color: var(--mute);
    letter-spacing: 0.1em;
  }
  .preds {
    border-top: 1px dashed var(--rule);
    padding: 6px 0;
    display: none;
  }
  .match.open .preds { display: block; }
  .pred {
    display: grid;
    grid-template-columns: 1fr auto auto;
    gap: 12px;
    align-items: center;
    padding: 9px 20px;
    font-size: 14px;
  }
  .pred-name { font-weight: 600; }
  .pill {
    font-family: 'Spline Sans Mono', monospace;
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 5px;
    background: #eef1ec;
    color: var(--ink);
    white-space: nowrap;
  }
  .pill.hit { background: var(--grass); color: #fff; }
  .pill.miss { background: #f3e3dd; color: var(--clay); }
  .pill.exact { background: var(--gold); color: var(--ink); font-weight: 600; }
  .caret {
    font-family: 'Spline Sans Mono', monospace;
    font-size: 11px;
    color: var(--mute);
    text-align: center;
    padding-bottom: 10px;
    letter-spacing: 0.1em;
  }

  /* ---- Rules ---- */
  .rules { max-width: 620px; }
  .rules h2 {
    font-size: 26px;
    font-weight: 900;
    text-transform: uppercase;
    margin: 28px 0 12px;
    letter-spacing: -0.01em;
  }
  .rule-item {
    display: grid;
    grid-template-columns: 40px 1fr;
    gap: 14px;
    padding: 16px 0;
    border-bottom: 1px solid var(--rule);
  }
  .rule-num {
    font-family: 'Spline Sans Mono', monospace;
    font-size: 14px;
    font-weight: 600;
    color: var(--grass);
  }
  .rule-item p { font-size: 15px; }
  .rule-item strong { font-weight: 700; }

  footer {
    text-align: center;
    padding: 30px 0;
    font-family: 'Spline Sans Mono', monospace;
    font-size: 11px;
    color: var(--mute);
    border-top: 1px solid var(--rule);
  }

  @media (max-width: 560px) {
    .lb-row { grid-template-columns: 40px 1fr auto; gap: 10px; }
    .lb-row .pts-col-2 { display: none; }
    .match-top { padding: 14px; gap: 8px; }
    .team { font-size: 15px; }
    .pred { grid-template-columns: 1fr auto; }
    .pred .pill:last-child { grid-column: 2; }
  }
</style>
</head>
<body>
<header>
  <div class="wrap">
    <div class="eyebrow">World Cup 2026 · Knockouts</div>
    <h1>The<br /><span class="alt">Knockout</span> Pool</h1>
    <p class="sub">One bracket. Ten friends. Pick the winner, call the exact score, climb the table. No second guesses — once it's in, it's in.</p>
    <nav class="tabs">
      <button class="tab active" data-view="table">Table</button>
      <button class="tab" data-view="matches">Matches</button>
      <button class="tab" data-view="rules">How it works</button>
    </nav>
  </div>
</header>

<main>
  <div class="wrap">
    <div id="status" class="status">Loading the pool…</div>
    <div id="view-table" class="view" style="display:none"></div>
    <div id="view-matches" class="view" style="display:none"></div>
    <div id="view-rules" class="view" style="display:none"></div>
  </div>
</main>

<footer>The Knockout Pool · scores update live from the sheet</footer>

<script>
// ============================================================
//  CONFIG — paste your two published-CSV links here
// ============================================================
const MATCHES_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT2Q30mB401c0Kguh-sswFiM-P62jQiXXnB86e84gppSXEENPzz5-p05Q-am6au3STjblevTIxRGXm0/pub?gid=854105704&single=true&output=csv";
const PREDICTIONS_CSV = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT2Q30mB401c0Kguh-sswFiM-P62jQiXXnB86e84gppSXEENPzz5-p05Q-am6au3STjblevTIxRGXm0/pub?gid=1216080431&single=true&output=csv";

// Round ordering for display
const ROUND_ORDER = [
  "Round of 32", "Round of 16", "Quarter-final", "Semi-final",
  "Third place", "Final"
];

// ============================================================
//  CSV parser (handles quoted fields + commas)
// ============================================================
function parseCSV(text) {
  const rows = [];
  let row = [], field = "", inQ = false;
  for (let i = 0; i < text.length; i++) {
    const c = text[i], n = text[i + 1];
    if (inQ) {
      if (c === '"' && n === '"') { field += '"'; i++; }
      else if (c === '"') inQ = false;
      else field += c;
    } else {
      if (c === '"') inQ = true;
      else if (c === ",") { row.push(field); field = ""; }
      else if (c === "\n") { row.push(field); rows.push(row); row = []; field = ""; }
      else if (c === "\r") { /* skip */ }
      else field += c;
    }
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function toObjects(rows) {
  if (!rows.length) return [];
  const head = rows[0].map(h => h.trim().toLowerCase());
  return rows.slice(1)
    .filter(r => r.some(c => c.trim() !== ""))
    .map(r => {
      const o = {};
      head.forEach((h, i) => o[h] = (r[i] || "").trim());
      return o;
    });
}

// ============================================================
//  Scoring
// ============================================================
function scorePrediction(pred, match) {
  // match.winner is the actual winning team name; match.score is "A-B"
  // (A = team_a goals, B = team_b goals)
  const result = { p1: false, p2: false, played: false };
  if (!match || !match.score || match.score.trim() === "") return result;
  result.played = true;

  // P1: winner pick
  if (pred.winner && match.winner &&
      pred.winner.trim().toLowerCase() === match.winner.trim().toLowerCase()) {
    result.p1 = true;
  }
  // P2: exact score (normalise both as digit-digit)
  const norm = s => (s || "").replace(/\s/g, "").replace(/[–—:to]/gi, "-");
  if (pred.score && norm(pred.score) === norm(match.score)) {
    result.p2 = true;
  }
  return result;
}

// ============================================================
//  Render
// ============================================================
let DATA = { matches: [], preds: [] };

function buildModel() {
  const matchById = {};
  DATA.matches.forEach(m => { matchById[m.id] = m; });

  // points per player
  const players = {};
  DATA.preds.forEach(p => {
    const name = p.player;
    if (!name) return;
    if (!players[name]) players[name] = { name, pts: 0, p1: 0, p2: 0, calls: 0 };
    const r = scorePrediction(p, matchById[p.match_id]);
    players[name].calls++;
    if (r.p1) { players[name].pts++; players[name].p1++; }
    if (r.p2) { players[name].pts++; players[name].p2++; }
  });
  return { matchById, players: Object.values(players).sort((a, b) => b.pts - a.pts || b.p2 - a.p2) };
}

function renderTable(model) {
  const el = document.getElementById("view-table");
  if (!model.players.length) {
    el.innerHTML = `<div class="status">No predictions yet. Once picks go in the sheet, the table fills up here.</div>`;
    return;
  }
  let h = `<div class="lb">
    <div class="lb-row head">
      <span>#</span><span>Player</span><span class="pts-col-2">Exact</span><span>Points</span>
    </div>`;
  model.players.forEach((p, i) => {
    h += `<div class="lb-row">
      <div class="rank">${String(i + 1).padStart(2, "0")}</div>
      <div>
        <div class="player-name">${esc(p.name)}</div>
        <div class="player-meta">${p.p1} winners · ${p.p2} exact · ${p.calls} calls</div>
      </div>
      <div class="pts-col-2">
        <div class="pts">${p.p2}</div>
        <div class="pts-label">exact</div>
      </div>
      <div>
        <div class="pts">${p.pts}</div>
        <div class="pts-label">pts</div>
      </div>
    </div>`;
  });
  h += `</div>`;
  el.innerHTML = h;
}

function renderMatches(model) {
  const el = document.getElementById("view-matches");
  if (!DATA.matches.length) {
    el.innerHTML = `<div class="status">No matches in the sheet yet.</div>`;
    return;
  }
  // group by round in defined order
  const byRound = {};
  DATA.matches.forEach(m => {
    const r = m.round || "Matches";
    (byRound[r] = byRound[r] || []).push(m);
  });
  const orderedRounds = [
    ...ROUND_ORDER.filter(r => byRound[r]),
    ...Object.keys(byRound).filter(r => !ROUND_ORDER.includes(r))
  ];

  let h = "";
  orderedRounds.forEach(round => {
    h += `<div class="round-head">${esc(round)}</div>`;
    byRound[round].forEach(m => {
      const played = m.score && m.score.trim() !== "";
      const [ga, gb] = played ? m.score.split(/[-–—:]/).map(s => s.trim()) : ["", ""];
      const aWin = played && m.winner && m.winner.toLowerCase() === (m.team_a || "").toLowerCase();
      const bWin = played && m.winner && m.winner.toLowerCase() === (m.team_b || "").toLowerCase();

      const mPreds = DATA.preds.filter(p => p.match_id === m.id);

      h += `<div class="match" data-id="${esc(m.id)}">
        <div class="match-top" onclick="toggleMatch('${esc(m.id)}')">
          <div class="team ${aWin ? "win" : (played ? "lose" : "")}">${esc(m.team_a || "TBD")}</div>
          <div class="score-box">
            ${played
              ? `<div class="score">${esc(ga)}–${esc(gb)}</div>`
              : `<div class="vs">VS</div>`}
          </div>
          <div class="team right ${bWin ? "win" : (played ? "lose" : "")}">${esc(m.team_b || "TBD")}</div>
        </div>`;

      if (mPreds.length) {
        h += `<div class="preds">`;
        mPreds.forEach(p => {
          const r = scorePrediction(p, m);
          const winClass = r.played ? (r.p1 ? "hit" : "miss") : "";
          const scoreClass = r.played ? (r.p2 ? "exact" : "miss") : "";
          h += `<div class="pred">
            <div class="pred-name">${esc(p.player)}</div>
            <div class="pill ${winClass}">${esc(p.winner || "—")}</div>
            <div class="pill ${scoreClass}">${esc(p.score || "—")}</div>
          </div>`;
        });
        h += `</div>
        <div class="caret">tap to ${"collapse / expand"}</div>`;
      }
      h += `</div>`;
    });
  });
  el.innerHTML = h;
}

function toggleMatch(id) {
  const node = document.querySelector(`.match[data-id="${CSS.escape(id)}"]`);
  if (node) node.classList.toggle("open");
}
window.toggleMatch = toggleMatch;

function renderRules() {
  const el = document.getElementById("view-rules");
  const rules = [
    ["Two picks per match", "For every knockout game you make <strong>two predictions</strong>: the team you think wins, and the exact final score."],
    ["How points work", "<strong>Winner right</strong> = 1 point. <strong>Exact score right</strong> = 1 point. Nail both and you bank <strong>2 points</strong> for that match."],
    ["Knockouts only", "32 matches, Round of 32 through the Final. Every result is a win or a loss — no draws to predict, the bracket decides it."],
    ["Locked in", "Predictions are made <strong>before kickoff</strong> and can't be changed once they're in the sheet. No edits, no take-backs."],
    ["The table", "Rank is by total points. Ties broken by <strong>exact scores called</strong> — reading the game beats just picking favourites."]
  ];
  let h = `<div class="rules"><h2>How it works</h2>`;
  rules.forEach((r, i) => {
    h += `<div class="rule-item">
      <div class="rule-num">${String(i + 1).padStart(2, "0")}</div>
      <p><strong>${r[0]}.</strong> ${r[1]}</p>
    </div>`;
  });
  h += `</div>`;
  el.innerHTML = h;
}

// ============================================================
//  Plumbing
// ============================================================
function esc(s) {
  return String(s == null ? "" : s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
}

function showView(name) {
  document.querySelectorAll(".view").forEach(v => v.style.display = "none");
  const v = document.getElementById("view-" + name);
  if (v) v.style.display = "block";
  document.querySelectorAll(".tab").forEach(t =>
    t.classList.toggle("active", t.dataset.view === name));
}

document.querySelectorAll(".tab").forEach(t => {
  t.addEventListener("click", () => showView(t.dataset.view));
});

async function fetchCSV(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error("fetch failed " + res.status);
  return toObjects(parseCSV(await res.text()));
}

async function load() {
  const status = document.getElementById("status");
  if (MATCHES_CSV.includes("PASTE_") || PREDICTIONS_CSV.includes("PASTE_")) {
    status.className = "status err";
    status.innerHTML = "⚙️ Not configured yet — paste your two CSV links into the CONFIG block at the top of this file, then refresh.";
    renderRules();
    showView("rules");
    return;
  }
  try {
    const [matches, preds] = await Promise.all([
      fetchCSV(MATCHES_CSV),
      fetchCSV(PREDICTIONS_CSV)
    ]);
    DATA.matches = matches;
    DATA.preds = preds;
    status.style.display = "none";
    const model = buildModel();
    renderTable(model);
    renderMatches(model);
    renderRules();
    showView("table");
  } catch (e) {
    status.className = "status err";
    status.textContent = "Couldn't load the sheet. Check that both tabs are published to the web as CSV.";
    console.error(e);
  }
}

load();
</script>
</body>
</html>
